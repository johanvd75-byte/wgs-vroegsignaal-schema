name: Strix Security

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      scan_mode:
        description: Scan depth
        required: true
        default: quick
        type: choice
        options:
          - quick
          - standard
          - deep
      max_budget_usd:
        description: Internal model-value cap; the configured Mistral key uses Free mode
        required: true
        default: "3"
        type: choice
        options:
          - "1"
          - "3"
          - "10"

permissions:
  contents: read

concurrency:
  group: strix-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  STRIX_ARCHIVE_SHA256: 7e8be841b9195a16e038eaa43e69452dc616fb19ca6979afbcaa9d842960e7e7
  STRIX_IMAGE: ghcr.io/usestrix/strix-sandbox@sha256:478e0b37ec83b2ba8c6e159593cb46d5dc9b624a45d6a9bb606851b83058d284
  STRIX_LLM: ${{ vars.STRIX_LLM }}
  STRIX_VERSION: "1.1.0"

jobs:
  scan:
    name: Source-only pentest
    runs-on: ubuntu-24.04
    timeout-minutes: 250
    steps:
      - name: Check authorization and provider
        id: preflight
        shell: bash
        env:
          ACTOR: ${{ github.actor }}
          CURRENT_REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          STRIX_LLM_API_KEY: ${{ secrets.STRIX_LLM_API_KEY }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "pull_request" && ( "$HEAD_REPO" != "$CURRENT_REPO" || "$ACTOR" == "dependabot[bot]" ) ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Strix is skipped for external forks and Dependabot because GitHub does not expose Actions secrets."
            exit 0
          fi
          if [[ -z "${STRIX_LLM:-}" || -z "$STRIX_LLM_API_KEY" ]]; then
            echo "::error::Configure the STRIX_LLM variable and STRIX_LLM_API_KEY repository secret."
            exit 1
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Check out source without persisted credentials
        if: steps.preflight.outputs.enabled == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install verified Strix release
        if: steps.preflight.outputs.enabled == 'true'
        shell: bash
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/strix.tar.gz"
          url="https://github.com/usestrix/strix/releases/download/v${STRIX_VERSION}/strix-${STRIX_VERSION}-linux-x86_64.tar.gz"
          curl --fail --location --retry 3 --output "$archive" "$url"
          printf '%s  %s\n' "$STRIX_ARCHIVE_SHA256" "$archive" | sha256sum --check
          tar -xzf "$archive" -C "$RUNNER_TEMP"
          sudo install -m 0755 "$RUNNER_TEMP/strix-${STRIX_VERSION}-linux-x86_64" /usr/local/bin/strix
          strix --version

      - name: Run bounded source scan
        if: steps.preflight.outputs.enabled == 'true'
        shell: bash
        env:
          BASE_REF: ${{ github.base_ref }}
          EVENT_NAME: ${{ github.event_name }}
          LLM_API_KEY: ${{ secrets.STRIX_LLM_API_KEY }}
          MANUAL_BUDGET: ${{ inputs.max_budget_usd }}
          MANUAL_MODE: ${{ inputs.scan_mode }}
        run: |
          set -euo pipefail
          mode="quick"
          budget="2"
          timeout_minutes="35"
          scope_args=(--scope-mode diff --diff-base "origin/${BASE_REF}")

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            mode="$MANUAL_MODE"
            budget="$MANUAL_BUDGET"
            scope_args=(--scope-mode full)
          fi

          case "$mode" in
            quick)
              timeout_minutes="35"
              export STRIX_REASONING_EFFORT="medium"
              ;;
            standard)
              timeout_minutes="100"
              export STRIX_REASONING_EFFORT="high"
              ;;
            deep)
              timeout_minutes="240"
              export STRIX_REASONING_EFFORT="high"
              ;;
            *)
              echo "::error::Unsupported scan mode: $mode"
              exit 1
              ;;
          esac

          log_file="$RUNNER_TEMP/strix.log"
          set +e
          timeout --signal=INT --kill-after=30s "${timeout_minutes}m" \
            strix --non-interactive \
              --mount "$GITHUB_WORKSPACE" \
              --instruction-file "$GITHUB_WORKSPACE/security/strix-instructions.md" \
              --scan-mode "$mode" \
              --max-budget-usd "$budget" \
              "${scope_args[@]}" >"$log_file" 2>&1
          status=$?
          set -e

          if grep -Eq 'reached the scan budget limit|Token budget .* exceeded' "$log_file"; then
            status=3
          fi

          case "$status" in
            0)
              echo "Strix completed without confirmed vulnerabilities."
              ;;
            2)
              echo "::error::Strix confirmed one or more vulnerabilities. Reproduce the scan locally to review protected details."
              ;;
            3)
              echo "::error::Strix reached its internal model-value cap before completing; this result is inconclusive."
              ;;
            124|130|137)
              echo "::error::Strix reached its time limit. Reproduce the scan locally to review protected details."
              ;;
            *)
              echo "::error::Strix failed with exit code $status. Reproduce the scan locally to diagnose it without publishing sensitive output."
              ;;
          esac
          exit "$status"
